version: '3.8'

services:
  # The Librarian (Custom Branded)
  perforce:
    image: perforce-p4:v25.2
    container_name: sddc-p4d
    restart: always
    ports:
      - "1666:1666"
    environment:
      - P4PORT=1666
      - P4USER=admin
      - P4PASSWD_FILE=/run/secrets/p4_admin_pass
      - P4NAME=mini-me-p4d  # This sets the ServerID
    volumes:
      - /mnt/stones/earth/p4data:/data
      - /mnt/stones/water/p4depots:/data/depots
      - ./secrets/p4_admin_pass:/run/secrets/p4_admin_pass:ro

  # The Automation Brain
  n8n:
    image: n8nio/n8n:latest
    container_name: sddc-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - WEBHOOK_URL=https://n8n.ethicalitllc.com/
      # n8n looks for this specific env var for file-based secrets
      - DB_POSTGRESDB_PASSWORD_FILE=/run/secrets/n8n_db_pass
      - N8N_ENCRYPTION_KEY_FILE=/run/secrets/n8n_encryption_key
    depends_on:
      - n8n-db
    volumes:
      - /mnt/stones/wind/n8n_data:/home/node/.n8n
      - ./secrets/n8n_db_pass:/run/secrets/n8n_db_pass:ro
      - ./secrets/n8n_encryption_key:/run/secrets/n8n_encryption_key:ro

  # The Memory (Postgres)
  n8n-db:
    image: postgres:16-alpine
    container_name: sddc-n8n-db
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_DB=n8n
      # Postgres official image supports _FILE for its password
      - POSTGRES_PASSWORD_FILE=/run/secrets/n8n_db_pass
    volumes:
      - /mnt/stones/earth/n8n_db_data:/var/lib/postgresql/data
      - ./secrets/n8n_db_pass:/run/secrets/n8n_db_pass:ro
  # The Front Door (Nginx Proxy Manager)
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: sddc-proxy
    restart: always
    ports:
      - '80:80'
      - '81:81'   # Admin UI for the Proxy
      - '443:443'
    volumes:
      - /mnt/stones/wind/proxy_data:/data
      - /mnt/stones/wind/proxy_letsencrypt:/etc/letsencrypt
    depends_on:
      - n8n
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sddc-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run