version: '3.8'
name: sddc-core
services:
  # The Librarian (Custom Branded)
  perforce:
    image: perforce-p4:v25.2
    container_name: sddc-p4d
    restart: always
    ports:
      - "1666:1666"
    #environment:
      #- P4PORT=1666
      #- P4USER=admin
      #- P4D_SUPER_PASSWD=/run/secrets/p4_admin_pass
      #- PERFORCE_UID=1000
      #- PERFORCE_GID=1000
    volumes:
          # Earth Stone: The Librarian's Brain (DB, Logs, License)
          - /mnt/stones/earth/p4data:/p4data
          # Water Stone: The Librarian's Vault (Actual Files/Depots)
          # Note: We map this to a separate root folder in the container
          - /mnt/stones/water/p4depots:/depots
          # Secrets
          - /mnt/stones/wind/secrets/p4_admin_pass:/run/secrets/p4_admin_pass:ro
  # The Automation Brain
  n8n:
    image: n8nio/n8n:latest
    container_name: sddc-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - WEBHOOK_URL=https://n8n.ethicalitllc.com/
      # n8n looks for this specific env var for file-based secrets
      - DB_POSTGRESDB_PASSWORD_FILE=/run/secrets/n8n_db_pass
      - N8N_ENCRYPTION_KEY_FILE=/run/secrets/n8n_encryption_key
    depends_on:
      - n8n-db
    volumes:
      - /mnt/stones/earth/n8n_data:/home/node/.n8n
      - /mnt/stones/wind/secrets/n8n_db_pass:/run/secrets/n8n_db_pass:ro
      - /mnt/stones/wind/secrets/n8n_encryption_key:/run/secrets/n8n_encryption_key:ro

  # The Memory (Postgres)
  n8n-db:
    image: postgres:16-alpine
    container_name: sddc-n8n-db
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_DB=n8n
      # Postgres official image supports _FILE for its password
      - POSTGRES_PASSWORD_FILE=/run/secrets/n8n_db_pass
    volumes:
      - /mnt/stones/earth/n8n_db_data:/var/lib/postgresql/data
      - /mnt/stones/wind/secrets/n8n_db_pass:/run/secrets/n8n_db_pass:ro
  # The Front Door (Nginx Proxy Manager)
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: sddc-proxy
    restart: always
    ports:
      - '80:80'
      - '81:81'   # Admin UI for the Proxy
      - '443:443'
    volumes:
      - /mnt/stones/earth/proxy_data:/data
      - /mnt/stones/earth/proxy_letsencrypt:/etc/letsencrypt
    depends_on:
      - n8n
  # The Tunnel (Cloudflared) for accesss from outside the SDDC
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sddc-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run

# The MAAS Database (Required)
  maas-db:
    image: postgres:14-alpine
    container_name: sddc-maas-db
    restart: always
    environment:
      - POSTGRES_USER=maas
      - POSTGRES_DB=maas
      - POSTGRES_PASSWORD_FILE=/run/secrets/maas_db_pass
    volumes:
      - /mnt/stones/earth/maas_db:/var/lib/postgresql/data
      - /mnt/stones/wind/secrets/maas_db_pass:/run/secrets/maas_db_pass:ro
