#    environment:
#      - MAAS_DBHOST=maas-db  # Point to the internal DB service
#      - MAAS_DBUSER=maas
#      - MAAS_DBPASS_FILE=/run/secrets/maas_db_pass
#      - MAAS_DBNAME=maas
